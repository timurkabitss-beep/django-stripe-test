<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Buy {{ item.name }}</title>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <h1>{{ item.name }}</h1>
    <p>{{ item.description }}</p>
    <p>Цена: ${{ item.price }}</p>
    <button id="buy-button">Buy</button>

    <script>
        const stripe = Stripe('{{ publishable_key }}');
        const buyButton = document.getElementById('buy-button');

        buyButton.addEventListener('click', () => {
            fetch('/buy/{{ item.id }}')
                .then(response => response.json())
                .then(data => {
            // Перенаправляем браузер на страницу Stripe
              if (data.url) {
                window.location.href = data.url;
              }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Ошибка при создании платежа');
        });
});
    </script>

    <hr>
    <h3>Купить через заказ (Order)</h3>
    <p>Этот способ создаёт заказ в базе данных перед оплатой.</p>
    <form action="{% url 'add_to_order' item.id %}" method="post">
        {% csrf_token %}
        <button type="submit">Добавить в заказ</button>
    </form>
</body>
</html>
